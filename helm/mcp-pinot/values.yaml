# Default values for mcp-pinot
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Global configuration
imagePullSecrets: []

# Image configuration
image:
  repository: ghcr.io/startreedata/mcp-pinot
  tag: "latest"
  pullPolicy: IfNotPresent


# Name override
nameOverride: ""
fullnameOverride: ""

# Service account
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# Pod security context
podSecurityContext:
  fsGroup: 1000

# Container security context
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 1000

# Service configuration
service:
  # Disabled by default because the default MCP bind host is loopback-only.
  # To expose the pod through a Service, set service.enabled=true,
  # mcp.host=0.0.0.0, and an auth provider (mcp.auth.provider=oauth|static,
  # or the legacy mcp.oauth.enabled=true).
  enabled: false
  type: ClusterIP
  port: 80
  targetPort: 8000
  annotations: {}

# Certificate configuration
certificate:
  enabled: false
  issuer: ""  # Required: ClusterIssuer or Issuer name for certificate creation
  commonName: ""  # Optional: Override common name (defaults to release name)
  secretName: ""  # Optional: Override secret name (defaults to {release-name}-tls)
  dnsNames: []  # Optional: Custom DNS names (defaults to cluster-local names)
  issuerKind: "ClusterIssuer"  # Optional: ClusterIssuer or Issuer
  issuerGroup: "cert-manager.io"  # Optional: API group for issuer

# Traefik IngressRoute configuration
traefik:
  enabled: false
  annotations: {}
  entryPoints:
    - web
  match: "Host(`mcp-pinot.yourdomain.com`)"
  middlewares: []
  tls:
    secretName: ""  # Set to your TLS secret name for HTTPS, leave empty for HTTP

# Resource configuration
resources: {}


# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}


# Deployment configuration
replicas: 1

# MCP Server Configuration
mcp:
  transport: "http"
  # Set to "0.0.0.0" only with an auth provider configured; otherwise the
  # server refuses network-reachable HTTP binds.
  host: "127.0.0.1"
  port: 8000
  path: "/mcp"
  ssl:
    enabled: false
    keyFile: "/etc/ssl/tls.key"
    certFile: "/etc/ssl/tls.crt"
  auth:
    # Auth provider for the MCP HTTP endpoint: "" (unset), "none", "oauth", or
    # "static". Takes precedence over the legacy mcp.oauth.enabled flag.
    # "" and "none" both mean unauthenticated and do not satisfy the
    # non-loopback exposure gate.
    provider: ""
    # Shared bearer token for provider=static (service-to-service callers).
    # Rendered into the chart Secret and mounted as MCP_STATIC_TOKEN.
    # Leave EMPTY to auto-generate: with provider=static the chart mints a random
    # token once on first install and persists it in the Secret (reused on every
    # upgrade via lookup), so no operator ever picks or pastes one. Set explicitly
    # only to pin a known value or share one supplied out-of-band.
    staticToken: ""
  oauth:
    # Legacy alias for mcp.auth.provider=oauth.
    enabled: false
    clientId: ""
    clientSecret: ""
    baseUrl: "http://localhost:8000"
    upstreamAuthorizationEndpoint: ""
    upstreamTokenEndpoint: ""
    jwksUri: ""
    issuer: ""
    audience: ""
    extraAuthorizeParams: {}

# Pinot Configuration
pinot:
  controller:
    url: "http://pinot-controller:9000"
  broker:
    url: "http://pinot-broker:8000"
  useMsqe: false
  requestTimeout: 60
  auth:
    enabled: false
    username: ""
    password: ""
    token: ""
    tokenFilename: ""

# Health check configuration
healthCheck:
  liveness:
    enabled: false
    path: "/"
    port: 8000
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    enabled: false
    path: "/"
    port: 8000
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

# Environment variables
env:
  # Additional environment variables
  additional: []
  # Environment variables from configmap
  configMap: []
  # Environment variables from secret
  secret: []

# Volume mounts
volumeMounts:
  # Additional volume mounts
  additional: []

# Volumes
volumes:
  # Additional volumes
  additional: []

# Pod annotations
podAnnotations: {}

# Pod labels
podLabels: {}
