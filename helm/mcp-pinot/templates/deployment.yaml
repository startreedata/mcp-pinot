{{- include "mcp-pinot.validateExposure" . }}
{{- if ne (int .Values.replicas) 1 }}
{{- fail "replicas must be 1: confirmation replay protection and rate limits are process-local" }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mcp-pinot.fullname" . }}
  labels:
    {{- include "mcp-pinot.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  strategy:
    {{- toYaml .Values.strategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "mcp-pinot.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "mcp-pinot.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      automountServiceAccountToken: {{ .Values.automountServiceAccountToken }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "mcp-pinot.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.mcp.port }}
              protocol: TCP
          env:
            # MCP Server Configuration
            - name: MCP_TRANSPORT
              value: {{ .Values.mcp.transport | quote }}
            - name: MCP_HOST
              value: {{ .Values.mcp.host | quote }}
            - name: MCP_PORT
              value: {{ .Values.mcp.port | quote }}
            - name: MCP_PATH
              value: {{ .Values.mcp.path | quote }}
            {{- if .Values.mcp.ssl.enabled }}
            - name: MCP_SSL_KEYFILE
              value: {{ .Values.mcp.ssl.keyFile | quote }}
            - name: MCP_SSL_CERTFILE
              value: {{ .Values.mcp.ssl.certFile | quote }}
            {{- end }}
            # Pinot Configuration
            - name: PINOT_CONTROLLER_URL
              value: {{ .Values.pinot.controller.url | quote }}
            - name: PINOT_BROKER_URL
              value: {{ .Values.pinot.broker.url | quote }}
            - name: PINOT_USE_MSQE
              value: {{ .Values.pinot.useMsqe | quote }}
            - name: PINOT_REQUEST_TIMEOUT
              value: {{ .Values.pinot.requestTimeout | quote }}
            {{- if .Values.pinot.auth.enabled }}
            - name: PINOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "mcp-pinot.fullname" . }}-secrets
                  key: username
                  optional: true
            - name: PINOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "mcp-pinot.fullname" . }}-secrets
                  key: password
                  optional: true
            - name: PINOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "mcp-pinot.fullname" . }}-secrets
                  key: token
                  optional: true
            - name: PINOT_TOKEN_FILENAME
              value: {{ .Values.pinot.auth.tokenFilename | quote }}
            {{- end }}
            
            # Auth Configuration
            {{- $authProvider := include "mcp-pinot.authProvider" . }}
            {{- if trim (toString (.Values.mcp.auth.provider | default "")) }}
            - name: AUTH_PROVIDER
              value: {{ $authProvider | quote }}
            {{- end }}
            {{- if and (eq $authProvider "static") .Values.mcp.auth.staticToken }}
            - name: MCP_STATIC_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "mcp-pinot.fullname" . }}-secrets
                  key: static-token
            {{- end }}
            {{- if eq $authProvider "static" }}
            - name: MCP_STATIC_SCOPES
              value: {{ join " " .Values.mcp.auth.staticScopes | quote }}
            {{- end }}

            # OAuth Configuration
            - name: OAUTH_ENABLED
              value: {{ .Values.mcp.oauth.enabled | quote }}
            {{- if eq $authProvider "oauth" }}
            - name: OAUTH_AUTHORIZATION_ENDPOINT
              value: {{ .Values.mcp.oauth.upstreamAuthorizationEndpoint | quote }}
            - name: OAUTH_TOKEN_ENDPOINT
              value: {{ .Values.mcp.oauth.upstreamTokenEndpoint | quote }}
            - name: OAUTH_JWKS_URI
              value: {{ .Values.mcp.oauth.jwksUri | quote }}
            - name: OAUTH_ISSUER
              value: {{ .Values.mcp.oauth.issuer | quote }}
            - name: OAUTH_CLIENT_ID
              value: {{ .Values.mcp.oauth.clientId | quote }}
            - name: OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "mcp-pinot.fullname" . }}-secrets
                  key: oauth-client-secret
                  optional: true
            - name: OAUTH_BASE_URL
              value: {{ .Values.mcp.oauth.baseUrl | quote }}
            {{- if .Values.mcp.oauth.audience }}
            - name: OAUTH_AUDIENCE
              value: {{ .Values.mcp.oauth.audience | quote }}
            {{- end }}
            {{- if .Values.mcp.oauth.extraAuthorizeParams }}
            - name: OAUTH_EXTRA_AUTH_PARAMS
              value: {{ .Values.mcp.oauth.extraAuthorizeParams | toJson | quote }}
            {{- end }}
            {{- end }}
            
            # Additional environment variables
            {{- with .Values.env.additional }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- with .Values.env.configMap }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- with .Values.env.secret }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          
          {{- if .Values.healthCheck.liveness.enabled }}
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen(sys.argv[1], timeout=float(sys.argv[2])).status == 200 else 1)"
                - {{ printf "http://127.0.0.1:%v%s" .Values.healthCheck.liveness.port .Values.healthCheck.liveness.path | quote }}
                - {{ .Values.healthCheck.liveness.timeoutSeconds | quote }}
            initialDelaySeconds: {{ .Values.healthCheck.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthCheck.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.healthCheck.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.healthCheck.liveness.failureThreshold }}
          {{- end }}
          
          {{- if .Values.healthCheck.readiness.enabled }}
          readinessProbe:
            exec:
              command:
                - python
                - -c
                - "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen(sys.argv[1], timeout=float(sys.argv[2])).status == 200 else 1)"
                - {{ printf "http://127.0.0.1:%v%s" .Values.healthCheck.readiness.port .Values.healthCheck.readiness.path | quote }}
                - {{ .Values.healthCheck.readiness.timeoutSeconds | quote }}
            initialDelaySeconds: {{ .Values.healthCheck.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthCheck.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.healthCheck.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.healthCheck.readiness.failureThreshold }}
          {{- end }}
          
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}

          {{- if gt (int .Values.preStopDelaySeconds) 0 }}
          lifecycle:
            preStop:
              exec:
                command:
                  - python
                  - -c
                  - {{ printf "import time; time.sleep(%v)" .Values.preStopDelaySeconds | quote }}
          {{- end }}
          
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- if .Values.certificate.enabled }}
            - name: tls
              mountPath: /etc/ssl
              readOnly: true
            {{- end }}
            {{- with .Values.volumeMounts.additional }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: {{ .Values.tmpVolume.sizeLimit | quote }}
        {{- if .Values.certificate.enabled }}
        - name: tls
          secret:
            secretName: {{ .Values.certificate.secretName | default (printf "%s-tls" (include "mcp-pinot.fullname" .)) | quote }}
        {{- end }}
        {{- with .Values.volumes.additional }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
